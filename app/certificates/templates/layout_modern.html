<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: A4 portrait; margin: 0; }
        * { box-sizing: border-box; }
        html, body {
            width: 210mm;
            height: 297mm;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Helvetica', 'Arial', sans-serif;
            background-color: #fff;
            color: #333;
            position: relative;
        }
        .page-border {
            position: absolute;
            top: 10mm; left: 10mm; right: 10mm; bottom: 10mm;
            border: 2px solid #333;
            padding: 10mm;
            text-align: center;
        }
        .header { height: 35mm; margin-bottom: 10mm; }
        .logo { max-height: 80px; max-width: 200px; }

        .center-block {
            position: absolute;
            top: 50%; left: 10mm; right: 10mm;
            transform: translateY(-55%);
            text-align: center;
        }

        h1 { font-size: 36px; margin: 0 0 15mm 0; color: #111; }
        .content { font-size: 20px; line-height: 1.8; }
        .names { font-weight: bold; font-size: 26px; text-decoration: underline; margin: 8px 0; display: block; color: #000; }

        .footer {
            position: absolute;
            bottom: 20mm; left: 20mm; right: 20mm;
            display: flex; justify-content: space-between; align-items: flex-end;
            text-align: left;
        }
        .footer-date { font-size: 16px; padding-bottom: 5mm; }
        .signature-box { width: 60mm; text-align: center; }
        .sig-img { max-width: 100%; max-height: 50px; margin-bottom: 5px; }
        .sig-line { border-top: 1px solid #333; padding-top: 5px; font-size: 14px; }

        .seal {
            position: absolute;
            bottom: 35mm; left: 50%;
            transform: translateX(-50%);
            width: 80px; height: 80px;
        }
    </style>
</head>
<body>
    <div class="page-border">
        <div class="header">
            {% if images.logo %}
            <img src="{{ images.logo }}" class="logo">
            {% endif %}
        </div>

        <div class="center-block">
            <h1>{{ title }}</h1>
            <div class="content">
                {{ body_text | safe }}
                {% if text_2 %}
                <br>{{ text_2 | safe }}
                {% endif %}
            </div>
        </div>

        {% if images.seal %}
        <img src="{{ images.seal }}" class="seal">
        {% endif %}

        <div class="footer">
            <div class="footer-date">
                Datum: {{ datum }}
            </div>
            <div class="signature-box">
                {% if images.signature %}
                <img src="{{ images.signature }}" class="sig-img"><br>
                {% else %}
                <div style="height: 50px;"></div>
                {% endif %}
                <div class="sig-line">Unterschrift Kursleiter</div>
            </div>
        </div>
    </div>
</body>
</html>
